<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisBET | Professional Betting Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Админ-кнопка */
        #adminMainButton { background: rgba(255, 77, 77, 0.1); font-weight: bold; transition: 0.3s; }
        #adminMainButton:hover { background: #ff4d4d; color: #fff !important; }

        /* Экран бана */
        #ban-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff4d4d; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; text-align: center; font-family: 'Inter', sans-serif;
        }

      
      /* --- СИСТЕМА УВЕДОМЛЕНИЙ (PREMIUM TOASTS) --- */
#toast-container {
    position: fixed;
    top: 25px;
    right: 25px;
    z-index: 10001;
    display: flex;
    flex-direction: column;
    gap: 12px;
    pointer-events: none; /* Чтобы контейнер не мешал кликам, пока пуст */
}

.toast {
    min-width: 320px;
    padding: 16px 20px;
    border-radius: 16px;
    background: rgba(11, 14, 17, 0.85); /* Глубокий темный */
    backdrop-filter: blur(15px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #fff;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    position: relative;
    overflow: hidden;
    pointer-events: auto; /* Возвращаем клики для самих уведомлений */
    
    /* Анимация появления */
    animation: toast-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* Эффект вылета наружу */
.toast.toast-out {
    animation: toast-out 0.4s cubic-bezier(0.7, 0, 0.84, 0) forwards;
}

/* Иконки с пульсацией */
.toast-icon {
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
}

.toast-content {
    flex: 1;
}

.toast-title {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 2px;
    display: block;
}

.toast-msg {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.7);
}

/* Типы и неоновое свечение */
.toast.success { 
    border-left: 4px solid #00ff88; 
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.15), 0 15px 35px rgba(0,0,0,0.4);
}
.toast.error { 
    border-left: 4px solid #ff4d4d; 
    box-shadow: 0 0 20px rgba(255, 77, 77, 0.15), 0 15px 35px rgba(0,0,0,0.4);
}
.toast.info { 
    border-left: 4px solid #00f2ea; 
    box-shadow: 0 0 20px rgba(0, 242, 234, 0.15), 0 15px 35px rgba(0,0,0,0.4);
}

/* Прогресс-бар времени */
.toast-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
}

.toast-progress-bar {
    height: 100%;
    width: 100%;
    transform-origin: left;
}

.success .toast-progress-bar { background: #00ff88; }
.error .toast-progress-bar { background: #ff4d4d; }
.info .toast-progress-bar { background: #00f2ea; }

/* Анимации */
@keyframes toast-in {
    0% { transform: translateX(120%) scale(0.9); opacity: 0; }
    100% { transform: translateX(0) scale(1); opacity: 1; }
}

@keyframes toast-out {
    0% { transform: translateX(0) scale(1); opacity: 1; }
    100% { transform: translateX(120%) scale(0.9); opacity: 0; }
}

@keyframes progress-anim {
    0% { transform: scaleX(1); }
    100% { transform: scaleX(0); }
}

        /* --- ВИЗУАЛЬНЫЕ СОЧНОСТИ --- */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card { height: 140px; margin-bottom: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }

        .team-logo {
            width: 32px; height: 32px; background: var(--turquoise); color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); flex-shrink: 0;
        }

        .match-teams-row { display: flex; align-items: center; gap: 15px; margin: 15px 0; }

        .history-grid { display: grid; gap: 20px; grid-template-columns: 1fr; }
        .history-section-title { 
            font-size: 14px; color: var(--turquoise); letter-spacing: 1px; 
            margin: 20px 0 10px; text-transform: uppercase; opacity: 0.8;
            border-bottom: 1px solid rgba(0,242,255,0.2); padding-bottom: 5px;
        }

        .bet-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 18px; position: relative;
            transition: 0.3s; overflow: hidden; margin-bottom: 10px;
        }
        .bet-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }

        .bet-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .bet-status-badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-win { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.3); }
        .status-loss { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3); }
        .status-pending { background: rgba(255, 204, 0, 0.1); color: #ffcc00; border: 1px solid rgba(255, 204, 0, 0.3); }

        .bet-event-info { margin-bottom: 12px; }
        .bet-event-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: block; }
        .bet-event-pick { color: var(--turquoise); font-size: 13px; }

        .bet-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1);
        }
        .bet-sum-label { font-size: 11px; color: rgba(255,255,255,0.5); display: block; }
        .bet-sum-val { font-size: 16px; font-weight: 700; }
        
        .potential-win { text-align: right; }
        .potential-win .win-label { font-size: 11px; color: rgba(255,255,255,0.5); }
        .potential-win .win-val { color: #00ff88; font-weight: 800; display: block; }

        .panel-hidden-keep-space { opacity: 0 !important; pointer-events: none !important; user-select: none !important; }

        .odd-box { cursor: pointer; transition: 0.2s; position: relative; }
        .odd-box:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--turquoise); }
        
        .odd-box.selected { background: var(--turquoise) !important; border-color: var(--turquoise) !important; }
        .odd-box.selected .label, .odd-box.selected .val { color: #000 !important; font-weight: 800; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="ban-screen">
        <div class="ban-box">
            <h1 style="font-size: 50px; margin-bottom: 10px;">⚠</h1>
            <h2>ВАШ АККАУНТ ЗАБЛОКИРОВАН</h2>
            <button onclick="localStorage.clear(); location.href='register.html'" style="padding: 12px 30px; background: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px;">ВЕРНУТЬСЯ К РЕГИСТРАЦИИ</button>
        </div>
    </div>

    <header class="header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer">Vis<span>BET</span></div>
        <nav class="top-nav" style="display: flex; gap: 10px; margin-left: 20px;">
            <button class="nav-link active" data-tab="line" onclick="switchMainTab('line')">Все события</button>
            <button class="nav-link" data-tab="history" onclick="switchMainTab('history')">История ставок</button>
            <button class="nav-link" data-tab="promo" onclick="switchMainTab('promo')">Акции</button>
        </nav>
        <div class="user-info-wrapper" style="display: flex; align-items: center; gap: 15px;">
            <button id="adminMainButton" class="nav-link" onclick="location.href='admin.html'" style="display: none; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 8px 15px;">Админ-панель</button>
            <div id="auth-zone" class="user-info"></div>
        </div>
    </header>

    <div class="main-layout">
        <aside id="leftSidebar" class="sidebar glass">
            <h3>Дисциплины</h3>
            <ul id="sportFilter">
                <li class="active" onclick="filterEvents('Все')">Все события</li>
                <li onclick="filterEvents('Футбол')">Футбол</li>
                <li onclick="filterEvents('Киберспорт')">Киберспорт</li>
            </ul>
        </aside>

        <section class="content-area">
            <div id="tab-line" class="tab-view active">
                <h2 id="current-category" style="margin-bottom: 20px; font-weight: 900; text-transform: uppercase;">Линия</h2>
                <div id="eventsContainer"></div>
            </div>

            <div id="tab-history" class="tab-view">
                <h2 style="margin-bottom: 5px; font-weight: 900;">МОИ СТАВКИ</h2>
                <div id="historyContainer"></div>
            </div>

            <div id="tab-promo" class="tab-view">
                <h2 style="margin-bottom: 20px; font-weight: 900;">БОНУСЫ</h2>
                <div class="glass" style="padding: 30px; border-left: 4px solid var(--turquoise);">
                    <h3 style="color: var(--turquoise);">Приветственный бонус +100%</h3>
                    <p style="color: var(--text-muted); margin-top: 10px;">При первом пополнении баланс удваивается автоматически.</p>
                </div>
            </div>
        </section>

        <aside id="rightCoupon" class="coupon-area">
            <div class="coupon-card glass" style="position: sticky; top: 20px;">
                <div class="coupon-header">
                    <span class="bet-type-badge" id="bet-type">Ординар</span>
                    <span style="font-size: 14px; font-weight: 700;">КУПОН</span>
                </div>
                <div id="slip-items">
                    <p style="text-align: center; color: var(--text-muted); padding: 20px;">Выберите исход</p>
                </div>
                <div id="slip-footer" style="display: none; margin-top: 20px;">
                    <div id="conflict-warning" style="color: #ff4d4d; font-size: 11px; text-align: center; margin-bottom: 10px; font-weight: bold; display: none; background: rgba(255, 77, 77, 0.1); padding: 8px; border-radius: 8px;">Пари не совместимо с другим</div>
                    
                    <div class="coupon-summary">
                        <input type="number" id="stakeAmount" placeholder="Сумма (₽)" oninput="updateWin()">
                        <div class="summary-row"><span>Общий Кф:</span><span id="summary-odd" style="color: var(--turquoise); font-weight: 800;">1.00</span></div>
                        <div class="summary-row"><span>Выигрыш:</span><span id="winAmount" style="color: var(--success);">0 ₽</span></div>
                    </div>
                    <button class="btn-submit-bet" onclick="placeOrder()">Заключить пари</button>
                    <button onclick="clearSlip()" style="background:none; border:none; color:var(--danger); width:100%; margin-top:10px; cursor:pointer; font-size:11px;">Очистить купон</button>
                </div>
            </div>
        </aside>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, collection, getDocs, doc, setDoc, updateDoc, getDoc, query, where, orderBy, onSnapshot 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKXVkuU3L_bxNIdXyDmUMcZHlpS7IF_Fw",
            authDomain: "visbet-b4fa1.firebaseapp.com",
            projectId: "visbet-b4fa1",
            storageBucket: "visbet-b4fa1.firebasestorage.app",
            messagingSenderId: "551263525115",
            appId: "1:551263525115:web:05265f14a1f1e77d48f85e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        // Экспортируем все нужные функции в глобальное окно
        window.fb = { collection, getDocs, doc, setDoc, updateDoc, getDoc, query, where, orderBy, onSnapshot };
        
        checkSession();
        loadEvents(); // Теперь эта функция создает постоянную связь (live)
        renderSlip();
    </script>

    <script>
        let allEvents = [];
        let currentUser = null;

       /**
 * Улучшенная система уведомлений VisBET
 * Поддерживает заголовки, прогресс-бар и неоновые стили
 */
window.showToast = (message, type = 'info', title = '') => {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    // Настройки иконок и заголовков по умолчанию
    const config = {
        success: { icon: '⚡', defaultTitle: 'Успешно' },
        error: { icon: '⚠️', defaultTitle: 'Ошибка' },
        info: { icon: 'ℹ️', defaultTitle: 'Инфо' }
    };

    const currentConfig = config[type] || config.info;

    toast.innerHTML = `
        <div class="toast-icon">${currentConfig.icon}</div>
        <div class="toast-content">
            <span class="toast-title">${title || currentConfig.defaultTitle}</span>
            <span class="toast-msg">${message}</span>
        </div>
        <div class="toast-progress">
            <div class="toast-progress-bar" style="animation: progress-anim 4s linear forwards"></div>
        </div>
    `;

    // Добавляем в контейнер
    container.appendChild(toast);

    // Функция для удаления уведомления с анимацией
    const removeToast = () => {
        if (toast.classList.contains('toast-out')) return; // Защита от повторного клика
        toast.classList.add('toast-out');
        setTimeout(() => toast.remove(), 400);
    };

    // Закрытие по клику на само уведомление
    toast.onclick = removeToast;

    // Автоматическое удаление через 4 секунды (время совпадает с анимацией прогресс-бара)
    setTimeout(removeToast, 4000);
};

        function formatMoney(num) {
            return new Intl.NumberFormat('ru-RU').format(Math.round(num)) + " ₽";
        }

        function getTeamLogo(teamName) {
            const letter = teamName ? teamName.trim().charAt(0) : '?';
            return `<div class="team-logo">${letter}</div>`;
        }

        const getSlip = () => JSON.parse(localStorage.getItem('visbet_slip') || '[]');
        const saveSlip = (data) => { 
            localStorage.setItem('visbet_slip', JSON.stringify(data)); 
            renderSlip(); 
            updateSelectedOdds();
        };

        function updateSelectedOdds() {
            const slip = getSlip();
            document.querySelectorAll('.odd-box').forEach(box => box.classList.remove('selected'));
            slip.forEach(item => {
                const button = document.querySelector(`.odd-box[data-event-id="${item.id}"][data-pick="${item.pick}"]`);
                if (button) button.classList.add('selected');
            });
        }

        async function checkSession() {
            const rawUser = localStorage.getItem('visbet_user');
            if (!rawUser) { renderAuthZone(null); return; }
            if (!window.fb || !window.fb.getDoc) return setTimeout(checkSession, 100);

            try {
                const docSnap = await window.fb.getDoc(window.fb.doc(window.db, "users", rawUser.trim()));
                if (docSnap.exists()) {
                    currentUser = docSnap.data();
                    if (currentUser.isBanned) { document.getElementById('ban-screen').style.display = 'flex'; return; }
                    renderAuthZone(currentUser);
                } else { logout(); }
            } catch (e) { console.error(e); }
        }

        function renderAuthZone(user) {
            const authZone = document.getElementById('auth-zone');
            const adminBtn = document.getElementById('adminMainButton');
            if (!user) {
                authZone.innerHTML = `<button class="btn-submit-bet" onclick="location.href='register.html'">Вход / Регистрация</button>`;
                return;
            }
            if (user.role === 'admin' || user.username.toLowerCase() === 'admin') adminBtn.style.display = 'block';
            authZone.innerHTML = `
                <div class="balance">${formatMoney(user.balance)}</div>
                <div class="username">${user.username}</div>
                <button class="btn-logout" onclick="logout()">Выйти</button>
            `;
        }

        window.logout = () => { localStorage.clear(); location.reload(); };

        async function loadHistory() {
            if (!currentUser) return;
            const container = document.getElementById('historyContainer');
            container.innerHTML = "<div class='skeleton skeleton-card'></div><div class='skeleton skeleton-card'></div>";
            
            try {
                const q = window.fb.query(window.fb.collection(window.db, "bets"), window.fb.where("userId", "==", currentUser.username));
                const snap = await window.fb.getDocs(q);
                let bets = [];
                snap.forEach(doc => bets.push(doc.data()));
                bets.sort((a, b) => new Date(b.date) - new Date(a.date));

                const activeBets = bets.filter(b => b.status === "В игре");
                const resolvedBets = bets.filter(b => b.status !== "В игре");

                let html = "";
                html += `<div class="history-section-title">В игре (${activeBets.length})</div>`;
                activeBets.forEach(bet => html += renderBetCard(bet));
                html += `<div class="history-section-title" style="margin-top:40px;">Рассчитанные (${resolvedBets.length})</div>`;
                resolvedBets.forEach(bet => html += renderBetCard(bet));
                container.innerHTML = `<div class="history-grid">${html}</div>`;
            } catch (e) { container.innerHTML = "Ошибка загрузки истории."; }
        }

        function renderBetCard(bet) {
            const statusClass = bet.status === 'Победа' ? 'status-win' : (bet.status === 'Проигрыш' ? 'status-loss' : 'status-pending');
            const totalWin = Math.round(bet.amount * bet.totalOdd);
            return `
                <div class="bet-card">
                    <div class="bet-card-header">
                        <span style="font-size:11px; opacity:0.5;">${bet.date}</span>
                        <span class="bet-status-badge ${statusClass}">${bet.status}</span>
                    </div>
                    ${bet.items.map(item => `
                        <div class="bet-event-info">
                            <span class="bet-event-name">${item.team}</span>
                            <span class="bet-event-pick">Выбор: ${item.pick} <span style="opacity:0.5; margin-left:10px;">кф. ${item.odd}</span></span>
                        </div>
                    `).join('')}
                    <div class="bet-footer">
                        <div><span class="bet-sum-label">Сумма</span><span class="bet-sum-val">${formatMoney(bet.amount)}</span></div>
                        <div style="text-align:center"><span class="bet-sum-label">Кф</span><span class="bet-sum-val" style="color:var(--turquoise)">${bet.totalOdd}</span></div>
                        <div class="potential-win">
                            <span class="win-label">${bet.status === 'Победа' ? 'Выигрыш' : 'Возможный'}</span>
                            <span class="win-val" style="color:${bet.status === 'Проигрыш' ? '#ff4d4d' : '#00ff88'}">${formatMoney(totalWin)}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        window.switchMainTab = (tab) => {
            document.querySelectorAll('.tab-view, .top-nav .nav-link').forEach(v => v.classList.remove('active'));
            const leftSidebar = document.getElementById('leftSidebar');
            const rightCoupon = document.getElementById('rightCoupon');
            if (tab === 'line') {
                leftSidebar.classList.remove('panel-hidden-keep-space');
                rightCoupon.classList.remove('panel-hidden-keep-space');
            } else {
                leftSidebar.classList.add('panel-hidden-keep-space');
                rightCoupon.classList.add('panel-hidden-keep-space');
            }
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            if (tab === 'history') loadHistory();
        };

        window.filterEvents = (sport) => {
            document.querySelectorAll('#sportFilter li').forEach(li => li.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('current-category').innerText = sport;
            if (sport === 'Все') renderLine(allEvents);
            else renderLine(allEvents.filter(ev => ev.sport === sport));
        };

        // --- LIVE РЕЖИМ: ЗАГРУЗКА СОБЫТИЙ ЧЕРЕЗ ONSNAPSHOT ---
        async function loadEvents() {
            const container = document.getElementById('eventsContainer');
            // Показываем скелетоны только при самой первой загрузке
            container.innerHTML = `<div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div>`;

            if(!window.fb || !window.fb.onSnapshot) return setTimeout(loadEvents, 500);
            
            const q = window.fb.collection(window.db, "events");

            // Подписываемся на обновления
            window.fb.onSnapshot(q, (snapshot) => {
                allEvents = [];
                snapshot.forEach(doc => allEvents.push({id: doc.id, ...doc.data()}));
                
                // Проверяем текущий выбранный спорт в боковом меню
                const activeLi = document.querySelector('#sportFilter li.active');
                const currentSport = activeLi ? activeLi.innerText : 'Все события';

                if (currentSport === 'Все события' || currentSport === 'Все') {
                    renderLine(allEvents);
                } else {
                    renderLine(allEvents.filter(ev => ev.sport === currentSport));
                }

                // Синхронизируем коэффициенты в купоне, если они изменились в базе
                syncSlipOdds();
            }, (error) => {
                console.error("Snapshot error:", error);
                container.innerHTML = "<p>Ошибка доступа к данным</p>";
            });
        }

        // --- СИНХРОНИЗАЦИЯ КУПОНА ПРИ ИЗМЕНЕНИИ КФ ---
        function syncSlipOdds() {
            let slip = getSlip();
            let changed = false;

            slip = slip.map(item => {
                const freshEvent = allEvents.find(e => e.id === item.id);
                if (freshEvent) {
                    let freshOdd;
                    // Проверяем маркеты
                    if (item.pick === 'П1') freshOdd = freshEvent.markets[0].outcomes[0].odd;
                    else if (item.pick === 'X') freshOdd = freshEvent.markets[0].outcomes[1].odd;
                    else if (item.pick === 'П2') freshOdd = freshEvent.markets[0].outcomes[freshEvent.markets[0].outcomes.length - 1].odd;

                    if (freshOdd && freshOdd !== item.odd) {
                        item.odd = freshOdd;
                        changed = true;
                    }
                }
                return item;
            });

            if (changed) {
                localStorage.setItem('visbet_slip', JSON.stringify(slip));
                renderSlip();
            }
        }

        function renderLine(events) {
            const container = document.getElementById('eventsContainer');
            if (events.length === 0) { container.innerHTML = "<p style='opacity:0.5'>Событий нет</p>"; return; }
            container.innerHTML = events.map(ev => `
                <div class="match-card glass animation-fade" style="margin-bottom:15px; padding:20px; cursor:pointer;" onclick="openMatch('${ev.id}')">
                    <div class="match-header" style="font-size:11px; opacity:0.6; display:flex; justify-content:space-between; align-items:center;">
                        <span>${ev.league} | ${ev.date} ${ev.time}</span>
                        <span style="background:rgba(0,242,255,0.1); padding:4px 8px; border-radius:5px; color:var(--turquoise)">${ev.sport}</span>
                    </div>
                    <div class="match-teams-row">
                        ${getTeamLogo(ev.teams.home)}
                        <div style="font-size:18px; font-weight:bold; flex:1;">${ev.teams.home} — ${ev.teams.away}</div>
                        ${getTeamLogo(ev.teams.away)}
                    </div>
                    <div class="odds-row" style="display:flex; gap:10px;" onclick="event.stopPropagation()">
                        <div class="odd-box" data-event-id="${ev.id}" data-pick="П1" onclick="addToSlip('${ev.id}', '${ev.teams.home} — ${ev.teams.away}', 'П1', ${ev.markets[0].outcomes[0].odd}, '${ev.markets[0].name}')">
                            <span class="label">П1</span><span class="val">${ev.markets[0].outcomes[0].odd}</span>
                        </div>
                        ${ev.markets[0].outcomes[1] ? `
                        <div class="odd-box" data-event-id="${ev.id}" data-pick="X" onclick="addToSlip('${ev.id}', '${ev.teams.home} — ${ev.teams.away}', 'X', ${ev.markets[0].outcomes[1].odd}, '${ev.markets[0].name}')">
                            <span class="label">X</span><span class="val">${ev.markets[0].outcomes[1].odd}</span>
                        </div>` : ''}
                        <div class="odd-box" data-event-id="${ev.id}" data-pick="П2" onclick="addToSlip('${ev.id}', '${ev.teams.home} — ${ev.teams.away}', 'П2', ${ev.markets[0].outcomes[ev.markets[0].outcomes.length - 1].odd}, '${ev.markets[0].name}')">
                            <span class="label">П2</span><span class="val">${ev.markets[0].outcomes[ev.markets[0].outcomes.length - 1].odd}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            updateSelectedOdds();
        }

        window.openMatch = (id) => { location.href = `event.html?id=${id}`; };

        window.addToSlip = (id, team, pick, odd, market) => {
            let slip = getSlip();
            const existingIndex = slip.findIndex(i => i.id === id && i.pick === pick);
            if (existingIndex !== -1) {
                slip.splice(existingIndex, 1);
                showToast("Событие удалено из купона", "info");
            } else {
                slip.push({id, team, pick, odd, market});
                showToast("Событие добавлено!", "success");
            }
            saveSlip(slip);
        };

        function renderSlip() {
            const slip = getSlip();
            const container = document.getElementById('slip-items');
            const footer = document.getElementById('slip-footer');
            const warn = document.getElementById('conflict-warning');
            const btn = document.querySelector('.btn-submit-bet');

            if(slip.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding:20px; color:gray;">Выберите исход</p>`;
                footer.style.display = 'none';
                updateSelectedOdds();
                return;
            }

            let hasConflict = false;
            const seen = {};
            slip.forEach(item => { if(seen[item.id]) hasConflict = true; seen[item.id] = true; });

            if(warn) warn.style.display = hasConflict ? 'block' : 'none';
            if(btn) {
                btn.disabled = hasConflict;
                btn.style.opacity = hasConflict ? '0.3' : '1';
                btn.style.cursor = hasConflict ? 'not-allowed' : 'pointer';
            }

            container.innerHTML = slip.map((item, idx) => `
                <div class="coupon-item" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-bottom:5px; border: 1px solid rgba(255,255,255,0.05);">
                    <div class="ci-top" style="display:flex; justify-content:space-between; font-weight:bold; font-size:13px;">
                        <span>${item.team}</span>
                        <button onclick="removeFromSlip(${idx})" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size:16px;">×</button>
                    </div>
                    <div class="ci-bottom" style="display:flex; justify-content:space-between; margin-top:5px;">
                        <span style="font-size:11px; opacity:0.7;">${item.pick}</span>
                        <span style="color:var(--turquoise); font-weight:bold;">${item.odd}</span>
                    </div>
                </div>
            `).join('');
            footer.style.display = 'block';
            const totalOdd = slip.reduce((sum, item) => sum * item.odd, 1).toFixed(2);
            document.getElementById('summary-odd').innerText = totalOdd;
            document.getElementById('bet-type').innerText = slip.length > 1 ? "Экспресс" : "Ординар";
            updateWin();
            updateSelectedOdds();
        }

        window.updateWin = () => {
            const amt = document.getElementById('stakeAmount').value || 0;
            const odd = parseFloat(document.getElementById('summary-odd').innerText);
            document.getElementById('winAmount').innerText = formatMoney(amt * odd);
        };

        window.removeFromSlip = (idx) => { 
            let s = getSlip(); 
            s.splice(idx, 1); 
            saveSlip(s); 
            showToast("Событие удалено", "info");
        };

        window.clearSlip = () => { saveSlip([]); showToast("Купон очищен", "info"); };

        window.placeOrder = async () => {
            if(!currentUser) { showToast("Войдите в аккаунт!", "error"); return; }
            const slip = getSlip();
            const amount = Math.round(parseFloat(document.getElementById('stakeAmount').value));
            if(!amount || amount < 10) { showToast("Минимум 10 ₽", "error"); return; }
            if(amount > currentUser.balance) { showToast("Недостаточно средств!", "error"); return; }

            const betData = {
                userId: currentUser.username,
                amount: amount,
                totalOdd: parseFloat(document.getElementById('summary-odd').innerText),
                items: slip,
                status: "В игре",
                date: new Date().toLocaleString()
            };

            try {
                await window.fb.setDoc(window.fb.doc(window.db, "bets", "bet_" + Date.now()), betData);
                await window.fb.updateDoc(window.fb.doc(window.db, "users", currentUser.username), {
                    balance: Math.round(currentUser.balance - amount)
                });
                saveSlip([]);
                showToast("Ставка принята! Удачи!", "success");
                // Обновляем данные пользователя без перезагрузки
                setTimeout(() => checkSession(), 500); 
            } catch (e) { showToast("Ошибка оформления ставки", "error"); }
        };

        window.addEventListener('storage', (e) => { if(e.key === 'visbet_slip') renderSlip(); });
    </script>
</body>
</html>
