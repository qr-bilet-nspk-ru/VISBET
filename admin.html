<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisBET | Cybercore Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root { 
            --accent: #00f2ff; --danger: #ff4d4d; --success: #00ff88; --warning: #ffaa00;
            --bg-dark: #07080c; --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { background: var(--bg-dark); font-family: 'Inter', sans-serif; color: #fff; margin: 0; overflow-x: hidden; }
        .admin-container { max-width: 1400px; margin: 30px auto; padding: 20px; }

        /* Custom Dropdown Styling */
        .custom-select { position: relative; width: 100%; cursor: pointer; user-select: none; margin-bottom: 10px; }
        .select-trigger { 
            padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; transition: 0.3s;
        }
        .custom-select.active .select-trigger { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,242,255,0.1); }
        .select-options { 
            position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: #12141d; 
            border: 1px solid var(--border); border-radius: 12px; z-index: 100; 
            max-height: 350px; overflow-y: auto; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .custom-select.active .select-options { display: block; }
        .option { padding: 12px; transition: 0.2s; font-size: 13px; color: rgba(255,255,255,0.7); }
        .option:hover { background: var(--accent); color: #000; }

        /* Header & Nav */
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-exit { 
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); 
            padding: 10px 20px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 12px;
        }
        .nav-panel { display: flex; gap: 8px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 16px; margin-bottom: 30px; }
        .nav-btn { 
            flex: 1; padding: 12px; border: none; background: transparent; color: rgba(255,255,255,0.4); 
            cursor: pointer; border-radius: 10px; font-weight: 600; transition: 0.3s;
        }
        .nav-btn.active { background: var(--accent); color: #000; }

        /* Content Areas */
        .content-box { display: none; animation: slideUp 0.4s ease; }
        .content-box.active { display: block; }
        .creator-grid { display: grid; grid-template-columns: 1fr 400px; gap: 30px; }
        .glass-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .cyber-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; 
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .cyber-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }

        .field-group { margin-bottom: 15px; }
        .btn-action { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 11px; margin-top: 10px; transition: 0.2s; }
        
        input, textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: #fff; border-radius: 12px; box-sizing: border-box; }
        textarea { font-family: monospace; font-size: 12px; resize: vertical; }
        
        .edit-banner { background: var(--warning); color: #000; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; font-weight: bold; justify-content: space-between; align-items: center; }

        #manual-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .wide-field { grid-column: span 2; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header-flex">
            <h1 style="margin:0; font-size: 20px; letter-spacing: 2px;">VIS<span style="color:var(--accent)">BET</span> CORE</h1>
            <a href="index.html" class="btn-exit">ГЛАВНАЯ СТРАНИЦА</a>
        </div>

        <div class="edit-banner" id="edit-banner">
            <span>⚡ РЕЖИМ ПРАВКИ МАТЧА: <small id="display-id"></small></span>
            <button onclick="location.reload()" style="background:#000; color:#fff; border:none; padding:5px 15px; border-radius:8px; cursor:pointer;">ОТМЕНИТЬ</button>
        </div>

        <nav class="nav-panel">
            <button class="nav-btn active" onclick="openTab(event, 'tab-create')">КОНСТРУКТОР</button>
            <button class="nav-btn" onclick="openTab(event, 'tab-line')">ЛИНИЯ</button>
            <button class="nav-btn" onclick="openTab(event, 'tab-bets')">СТАВКИ</button>
            <button class="nav-btn" onclick="openTab(event, 'tab-users')">ИГРОКИ</button>
        </nav>

        <div id="tab-create" class="content-box active">
            <div class="creator-grid">
                <div class="glass-panel">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:10px;">
                        <div class="field-group">
                            <label class="card-label">Спорт</label>
                            <div class="custom-select" id="select-sport">
                                <div class="select-trigger" onclick="toggleSelect(this)"><span>Футбол</span> ▾</div>
                                <div class="select-options">
                                    <div class="option" onclick="setSelect(this, 'Футбол', initSport)">Футбол</div>
                                    <div class="option" onclick="setSelect(this, 'Киберспорт', initSport)">Киберспорт</div>
                                </div>
                            </div>
                        </div>
                        <div class="field-group">
                            <label class="card-label">Лига</label>
                            <div class="custom-select" id="select-league">
                                <div class="select-trigger" onclick="toggleSelect(this)"><span>Выберите лигу</span> ▾</div>
                                <div class="select-options" id="league-opts"></div>
                            </div>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:10px;">
                        <div class="field-group"><label class="card-label">Команда 1</label><input type="text" id="t1" placeholder="ЦСКА"></div>
                        <div class="field-group"><label class="card-label">Команда 2</label><input type="text" id="t2" placeholder="Ростов"></div>
                    </div>
                    <div class="field-group"><label class="card-label">Дата и время начала</label><input type="datetime-local" id="m-time"></div>
                    
                    <hr style="border:0; border-top:1px solid var(--border); margin:25px 0;">

                    <div style="background:rgba(0,242,255,0.03); padding:20px; border-radius:15px; border: 1px solid rgba(0,242,255,0.2);">
                        <label class="card-label" style="color:var(--accent)">🚀 БЫСТРЫЙ ИМПОРТ ИЗ БЛОКНОТА</label>
                        <textarea id="quick-import" rows="5" placeholder='Вставь содержимое markets: { ... }'></textarea>
                        <button class="btn-action" style="background:var(--accent); color:#000;" onclick="parseQuickImport()">РАСПОЗНАТЬ И ДОБАВИТЬ ВСЕ РЫНКИ</button>
                    </div>

                    <p style="text-align:center; opacity:0.3; font-size:11px; margin:15px 0;">ИЛИ РУЧНАЯ НАСТРОЙКА</p>

                    <div style="background:rgba(0,0,0,0.2); padding:20px; border-radius:15px; border: 1px solid var(--border);">
                        <div class="field-group">
                            <label class="card-label">Выбор одного рынка</label>
                            <div class="custom-select" id="select-market">
                                <div class="select-trigger" onclick="toggleSelect(this)"><span>Выберите рынок</span> ▾</div>
                                <div class="select-options" id="market-opts"></div>
                            </div>
                        </div>
                        
                        <div id="calc-area" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px; margin-bottom:15px;">
                            <div><label class="card-label">П1 %</label><input type="number" id="p1" value="45"></div>
                            <div><label class="card-label">X %</label><input type="number" id="px" value="10"></div>
                            <div><label class="card-label">П2 %</label><input type="number" id="p2" value="45"></div>
                        </div>

                        <button class="nav-btn" style="background:rgba(255,255,255,0.1); color:#fff; width:100%;" onclick="prepareMarket()">НАСТРОИТЬ ВЫБРАННЫЙ РЫНОК</button>
                        
                        <div id="manual-area" style="display:none; margin-top:20px; border-top: 1px solid var(--border); padding-top: 20px;">
                            <div id="manual-fields"></div>
                            <button class="btn-action" style="background:var(--success); color:#000;" onclick="saveMarketToBundle()">СОХРАНИТЬ РЫНОК В МАТЧ</button>
                        </div>
                    </div>
                </div>

                <div class="glass-panel">
                    <h3>СОСТАВ МАТЧА</h3>
                    <div id="bundle-list" style="margin:20px 0; min-height: 50px;"></div>
                    <button class="nav-btn" id="main-save-btn" style="width:100%; background:var(--accent); color:#000; margin-top:20px; font-size:14px; height:50px;" onclick="pushMatchToDB()">ОПУБЛИКОВАТЬ МАТЧ В ЛИНИЮ</button>
                </div>
            </div>
        </div>

        <div id="tab-line" class="content-box"><div class="data-grid" id="line-list"></div></div>
        <div id="tab-bets" class="content-box"><div class="data-grid" id="bets-list"></div></div>
        <div id="tab-users" class="content-box"><div class="data-grid" id="users-list"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKXVkuU3L_bxNIdXyDmUMcZHlpS7IF_Fw",
            authDomain: "visbet-b4fa1.firebaseapp.com",
            projectId: "visbet-b4fa1",
            storageBucket: "visbet-b4fa1.firebasestorage.app",
            messagingSenderId: "551263525115",
            appId: "1:551263525115:web:05265f14a1f1e77d48f85e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CONFIG = {
            "Футбол": { 
                leagues: ["АПЛ", "Ла Лига", "Серия А", "Бундеслига", "ЛЧ", "РПЛ", "Лига Европы"], 
                markets: [
                    { name: "Исход Основное время", type: "calc", outs: ["П1", "X", "П2"], id: "main_time" },
                    { name: "Двойной шанс", type: "calc", outs: ["1X", "12", "X2"], id: "double_chance" },
                    { name: "Исход 1-й тайм", type: "calc", outs: ["П1 (1-й т.)", "X (1-й т.)", "П2 (1-й т.)"], id: "first_half" },
                    { name: "Исход 2-й тайм", type: "calc", outs: ["П1 (2-й т.)", "X (2-й т.)", "П2 (2-й т.)"], id: "second_half" },
                    { name: "Тотал Основное время", type: "manual", outs: ["0.5 Б", "0.5 М", "1.5 Б", "1.5 М", "2.5 Б", "2.5 М", "3.5 Б", "3.5 М", "4.5 Б", "4.5 М", "5.5 Б", "5.5 М"], id: "total_full" },
                    { name: "Тотал Команды 1", type: "manual", outs: ["0.5 Б (Т1)", "1.5 Б (Т1)", "2.5 Б (Т1)", "3.5 Б (Т1)"], id: "total_team1" },
                    { name: "Тотал Команды 2", type: "manual", outs: ["0.5 Б (Т2)", "1.5 Б (Т2)", "2.5 Б (Т2)", "3.5 Б (Т2)"], id: "total_team2" },
                    { name: "Обе забьют", type: "calc", outs: ["Да", "Нет"], id: "both_score" },
                    { name: "Следующий гол", type: "calc", outs: ["Команда 1 ", "Никто", "Команда 2 "], id: "next_goal" },
                    { name: "Исход Угловые", type: "calc", outs: ["П1 Угл.", "X Угл.", "П2 Угл."], id: "corners" },
                    { name: "Точный Счет", type: "manual", outs: ["0:0","1:0","0:1","1:1","2:2","2:0","0:2","2:1","1:2","3:0","0:3","3:3","3:1","1:3","2:3","3:2","4:4","4:3","3:4","4:2","2:4","1:4","4:1","0:4","4:0"], id: "exact_score" }
                ] 
            },
            "Киберспорт": { 
                leagues: ["PGL Major", "BLAST Premier", "The International", "LPL", "LEC", "ESL Pro League"], 
                markets: [
                    { name: "Исход матча", type: "calc", outs: ["П1", "П2"], id: "main_time" },
                    { name: "Точный счет (BO3)", type: "manual", outs: ["2:0", "2:1", "1:2", "0:2"], id: "exact_score" }
                ] 
            }
        };

        window.bundle = []; 
        let editId = null;

        // --- ЛОГИКА ИМПОРТА ИЗ БЛОКНОТА ---
        window.parseQuickImport = () => {
    const raw = document.getElementById('quick-import').value.trim();
    if(!raw) return alert("Поле пустое!");
    
    try {
        // Парсим входящий текст
        const data = eval("(" + raw + ")");
        
        // 1. АВТОЗАПОЛНЕНИЕ ПОЛЕЙ (Команды и Время), если они есть в JSON
        if (data.info) {
            if (data.info.t1) document.getElementById('t1').value = data.info.t1;
            if (data.info.t2) document.getElementById('t2').value = data.info.t2;
            if (data.info.time) document.getElementById('m-time').value = data.info.time;
        }

        // 2. ИМПОРТ РЫНКОВ
        const sport = document.getElementById('select-sport').dataset.value || "Футбол";
        const configMarkets = CONFIG[sport].markets;

        // Итерируемся по рынкам (пропускаем объект info)
        for (let key in data) {
            if (key === 'info') continue; 

            const cfg = configMarkets.find(m => m.id === key);
            if (cfg) {
                const outcomes = [];
                for (let outName in data[key]) {
                    outcomes.push({ name: outName, odd: data[key][outName] });
                }
                
                const existingIdx = window.bundle.findIndex(b => b.name === cfg.name);
                if(existingIdx > -1) window.bundle[existingIdx] = { name: cfg.name, outcomes: outcomes };
                else window.bundle.push({ name: cfg.name, outcomes: outcomes });
            }
        }

        renderBundle();
        alert("✅ Данные матча и коэффициенты загружены!");
        document.getElementById('quick-import').value = "";
    } catch (e) {
        alert("❌ Ошибка формата!\n" + e.message);
    }
};

        // --- UI Logic ---
        window.toggleSelect = (el) => {
            const p = el.parentElement;
            document.querySelectorAll('.custom-select').forEach(s => s !== p && s.classList.remove('active'));
            p.classList.toggle('active');
        };

        window.setSelect = (el, val, cb) => {
            const p = el.closest('.custom-select');
            p.querySelector('.select-trigger span').innerText = val;
            p.dataset.value = val;
            p.classList.remove('active');
            if(cb) cb(val);
        };

        window.initSport = () => {
            const s = document.getElementById('select-sport').dataset.value || "Футбол";
            document.getElementById('league-opts').innerHTML = CONFIG[s].leagues.map(l => `<div class="option" onclick="setSelect(this, '${l}')">${l}</div>`).join('');
            document.getElementById('market-opts').innerHTML = CONFIG[s].markets.map(m => `<div class="option" onclick="setSelect(this, '${m.name}')">${m.name}</div>`).join('');
            window.bundle = []; renderBundle();
        };

        window.prepareMarket = () => {
            const sport = document.getElementById('select-sport').dataset.value || "Футбол";
            const marketName = document.getElementById('select-market').dataset.value;
            if(!marketName) return alert("Выберите рынок!");

            const marketCfg = CONFIG[sport].markets.find(m => m.name === marketName);
            const area = document.getElementById('manual-fields');
            area.innerHTML = '';
            
            if(marketCfg.type === 'calc') {
                const p1 = Math.max(1, parseFloat(document.getElementById('p1').value) || 0);
                const px = parseFloat(document.getElementById('px').value) || 0;
                const p2 = Math.max(1, parseFloat(document.getElementById('p2').value) || 0);
                const totalProb = p1 + px + p2;
                const margin = 1.07; 

                marketCfg.outs.forEach((label, i) => {
                    let prob = (marketCfg.outs.length === 3) ? (i === 0 ? p1 : (i === 1 ? px : p2)) : (i === 0 ? p1 : p2);
                    const odd = (1 / ((prob / totalProb) * margin)).toFixed(2);
                    addInputField(label, odd);
                });
            } else {
                marketCfg.outs.forEach(label => addInputField(label, ""));
            }
            document.getElementById('manual-area').style.display = 'block';
        };

        function addInputField(lbl, val) {
            const area = document.getElementById('manual-fields');
            area.innerHTML += `
                <div class="field-group ${lbl.length > 5 ? 'wide-field' : ''}">
                    <label class="card-label">${lbl}</label>
                    <input type="number" step="0.01" class="f-odd" data-name="${lbl}" value="${val}">
                </div>`;
        }

        window.saveMarketToBundle = () => {
            const m = document.getElementById('select-market').dataset.value;
            const outs = Array.from(document.querySelectorAll('.f-odd')).map(i => ({ 
                name: i.dataset.name, 
                odd: parseFloat(i.value) || 1.00 
            }));
            const idx = window.bundle.findIndex(b => b.name === m);
            if(idx > -1) window.bundle[idx] = { name: m, outcomes: outs }; 
            else window.bundle.push({ name: m, outcomes: outs });
            renderBundle();
            document.getElementById('manual-area').style.display = 'none';
        };

        function renderBundle() {
            document.getElementById('bundle-list').innerHTML = window.bundle.map((m, i) => `
                <div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border);">
                    <span><b>${m.name}</b> <small style="color:var(--accent); margin-left:10px;">(${m.outcomes.length} кф.)</small></span>
                    <button onclick="removeFromBundle(${i})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:18px;">&times;</button>
                </div>
            `).join('');
        }

        window.removeFromBundle = (idx) => { window.bundle.splice(idx,1); renderBundle(); };

        window.pushMatchToDB = async () => {
            const time = document.getElementById('m-time').value;
            const t1 = document.getElementById('t1').value;
            const t2 = document.getElementById('t2').value;
            const league = document.getElementById('select-league').dataset.value;
            if(!t1 || !t2 || !time || !league || window.bundle.length === 0) return alert("Заполните название команд, время и добавьте хотя бы один рынок коэффициентов!");

            const id = editId || "match_" + Date.now();
            await setDoc(doc(db, "events", id), {
                sport: document.getElementById('select-sport').dataset.value || "Футбол",
                league: league, teams: { home: t1, away: t2 },
                date: time.split('T')[0], time: time.split('T')[1], markets: window.bundle,
                timestamp: Date.now()
            });
            alert("Матч опубликован!"); location.reload();
        };

        // --- Стандартные функции управления вкладками ---
        window.openTab = (e, t) => {
            document.querySelectorAll('.content-box, .nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            if(e) e.currentTarget.classList.add('active');
            if(t === 'tab-line') loadLine(); if(t === 'tab-bets') loadBets(); if(t === 'tab-users') loadUsers();
        };

        async function loadLine() {
            const s = await getDocs(collection(db, "events"));
            document.getElementById('line-list').innerHTML = s.docs.map(d => `
                <div class="cyber-card">
                    <span class="card-label">${d.data().sport} | ${d.data().league}</span>
                    <b>${d.data().teams.home} — ${d.data().teams.away}</b>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn-action" onclick="startEdit('${d.id}')">ИЗМЕНИТЬ</button>
                        <button class="btn-action" style="color:var(--danger)" onclick="deleteMatch('${d.id}')">УДАЛИТЬ</button>
                    </div>
                </div>
            `).join('');
        }

        window.startEdit = async (id) => {
            editId = id; const s = await getDoc(doc(db, "events", id)); const d = s.data();
            document.getElementById('t1').value = d.teams.home; document.getElementById('t2').value = d.teams.away;
            document.getElementById('m-time').value = `${d.date}T${d.time}`; window.bundle = d.markets || [];
            document.getElementById('display-id').innerText = id; document.getElementById('edit-banner').style.display = 'flex';
            renderBundle(); openTab(null, 'tab-create');
        };

        window.deleteMatch = async (id) => { if(confirm("Удалить матч из линии?")) { await deleteDoc(doc(db, "events", id)); loadLine(); } };

        async function loadBets() {
            const s = await getDocs(collection(db, "bets"));
            document.getElementById('bets-list').innerHTML = s.docs.map(d => {
                const b = d.data(); if(b.status !== "В игре") return "";
                return `<div class="cyber-card">
                    <span class="card-label">ID: ${d.id.slice(-6)}</span>
                    <div style="font-size:12px; margin:5px 0;">Сумма: <b>${b.amount} ₽</b> | Кф: ${b.totalOdd}</div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn-action" style="background:var(--success); color:#000" onclick="resBet('${d.id}','${b.userId}',${b.amount},${b.totalOdd},'Выигрыш')">ВИН</button>
                        <button class="btn-action" style="background:var(--danger)" onclick="resBet('${d.id}','${b.userId}',0,0,'Проигрыш')">ЛОСС</button>
                    </div>
                </div>`;
            }).join('');
        }

        window.resBet = async (bid, uid, amt, odd, res) => {
            await updateDoc(doc(db, "bets", bid), { status: res });
            if(res === 'Выигрыш') {
                const uRef = doc(db, "users", uid); const u = await getDoc(uRef);
                await updateDoc(uRef, { balance: u.data().balance + (amt * odd) });
            }
            loadBets();
        };

        async function loadUsers() {
            const s = await getDocs(collection(db, "users"));
            document.getElementById('users-list').innerHTML = s.docs.map(d => {
                const u = d.data();
                return `<div class="cyber-card">
                    <b>${u.username || 'Игрок'}</b><h3 style="color:var(--success)">${Math.round(u.balance || 0)} ₽</h3>
                    <button class="btn-action" onclick="editU('${d.id}')">ИЗМЕНИТЬ БАЛАНС</button>
                </div>`;
            }).join('');
        }

        window.editU = async (id) => { 
            const val = prompt("Введите новую сумму баланса:"); 
            if(val) { await updateDoc(doc(db, "users", id), { balance: parseInt(val) }); loadUsers(); } 
        };

        document.addEventListener('click', (e) => { if(!e.target.closest('.custom-select')) document.querySelectorAll('.custom-select').forEach(s => s.classList.remove('active')); });
        initSport();
    </script>
</body>
</html>
