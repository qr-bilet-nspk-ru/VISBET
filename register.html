<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisBET | Вход и Регистрация</title>
    <style>
        :root { 
            --accent: #00f2ff; --danger: #ff4d4d; --bg-dark: #07080c; 
            --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            background: var(--bg-dark); font-family: 'Inter', sans-serif; color: #fff; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .auth-card { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 40px; 
            border-radius: 24px; width: 100%; max-width: 400px; backdrop-filter: blur(10px);
        }
        h2 { text-align: center; letter-spacing: 2px; margin-bottom: 30px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            color: #fff; border-radius: 12px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }
        .btn-auth { 
            width: 100%; padding: 15px; background: var(--accent); color: #000; 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px;
        }
        .toggle-link { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.5); cursor: pointer; }
        .toggle-link span { color: var(--accent); }

        /* Экран Бана */
        #ban-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            text-align: center;
        }
        .ban-icon { font-size: 80px; color: var(--danger); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="ban-overlay">
        <div class="ban-icon">⚠</div>
        <h1 style="color: var(--danger)">ВАШ АККАУНТ ЗАБЛОКИРОВАН</h1>
        <p style="opacity: 0.7; max-width: 400px;">Вы нарушили правила пользования платформой VisBET. Доступ к функциям ставок ограничен.</p>
        <button onclick="location.reload()" class="btn-auth" style="width: auto; padding: 10px 30px; background: #fff;">ОБНОВИТЬ</button>
    </div>

    <div class="auth-card" id="auth-form">
        <h2 id="form-title">РЕГИСТРАЦИЯ</h2>
        
        <div class="field">
            <label>Имя пользователя</label>
            <input type="text" id="username" placeholder="Ivanov777">
        </div>

        <div class="field">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-auth" id="main-btn" onclick="handleAuth()">СОЗДАТЬ АККАУНТ</button>
        
        <div class="toggle-link" onclick="toggleMode()">
            <p id="toggle-text">Уже есть аккаунт? <span>Войти</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKXVkuU3L_bxNIdXyDmUMcZHlpS7IF_Fw",
            authDomain: "visbet-b4fa1.firebaseapp.com",
            projectId: "visbet-b4fa1",
            storageBucket: "visbet-b4fa1.firebasestorage.app",
            messagingSenderId: "551263525115",
            appId: "1:551263525115:web:05265f14a1f1e77d48f85e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isLoginMode = false;

        window.toggleMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').innerText = isLoginMode ? "ВХОД" : "РЕГИСТРАЦИЯ";
            document.getElementById('main-btn').innerText = isLoginMode ? "ВОЙТИ" : "СОЗДАТЬ АККАУНТ";
            document.getElementById('toggle-text').innerHTML = isLoginMode ? 
                "Нет аккаунта? <span>Зарегистрироваться</span>" : "Уже есть аккаунт? <span>Войти</span>";
        };

        window.handleAuth = async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!user || !pass) return alert("Заполните все поля!");

            const userRef = doc(db, "users", user);

            try {
                const snap = await getDoc(userRef);

                if (isLoginMode) {
                    // --- ЛОГИКА ВХОДА ---
                    if (snap.exists()) {
                        const data = snap.data();
                        
                        // Проверка на БАН
                        if (data.isBanned) {
                            showBanScreen();
                            return;
                        }

                        if (data.password === pass) {
                            localStorage.setItem('visbet_user', user);
                            location.href = 'index.html'; // Уходим на главную
                        } else {
                            alert("Неверный пароль!");
                        }
                    } else {
                        alert("Пользователь не найден!");
                    }
                } else {
                    // --- ЛОГИКА РЕГИСТРАЦИИ ---
                    if (snap.exists()) {
                        alert("Это имя уже занято!");
                    } else {
                        await setDoc(userRef, {
                            username: user,
                            password: pass,
                            balance: 1000, // Бонус при регистрации
                            isBanned: false,
                            regDate: new Date().toISOString()
                        });
                        localStorage.setItem('visbet_user', user);
                        alert("Регистрация успешна!");
                        location.href = 'index.html';
                    }
                }
            } catch (e) {
                console.error(e);
                alert("Ошибка доступа к базе данных.");
            }
        };

        function showBanScreen() {
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('ban-overlay').style.display = 'flex';
        }

        // Авто-проверка при загрузке (если уже залогинен)
        async function checkCurrentSession() {
            const savedUser = localStorage.getItem('visbet_user');
            if (savedUser) {
                const snap = await getDoc(doc(db, "users", savedUser));
                if (snap.exists() && snap.data().isBanned) {
                    showBanScreen();
                }
            }
        }
        checkCurrentSession();
    </script>
</body>
</html>
