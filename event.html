<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VisBET События">
    <meta name="theme-color" content="#0b0e11">
    <title>Линия события | VisBET</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Скелетоны и анимация */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 10px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .event-main-info {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .teams-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }

        .team-logo {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            object-fit: contain;
            box-shadow: inset 0 0 20px rgba(56,189,248,0.12);
            backdrop-filter: blur(10px);
        }

        .vs-divider {
            font-size: 24px;
            font-weight: 900;
            opacity: 0.3;
            font-style: italic;
        }

        .event-teams-large {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .market-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .market-tab {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #c9d0d5;
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.18s ease;
            white-space: nowrap;
        }

        .market-tab:hover {
            background: rgba(56,189,248,0.12);
            color: var(--turquoise);
            border-color: rgba(56,189,248,0.3);
            transform: translateY(-1px);
        }

        .market-tab.active {
            background: var(--turquoise);
            color: #001314;
            border-color: var(--turquoise);
            box-shadow: 0 14px 35px rgba(56,189,248,0.16);
        }

        .market-section {
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
        }

        .market-name {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: var(--turquoise);
            text-transform: uppercase;
            margin-bottom: 12px;
            border-left: 3px solid var(--turquoise);
            padding-left: 10px;
        }

        .outcomes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .odd-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .odd-item:hover {
            background: rgba(56,189,248,0.12);
            border-color: var(--turquoise);
            transform: translateY(-2px);
        }

        .odd-item.selected {
            background: var(--turquoise);
            border-color: var(--turquoise);
        }
        .odd-item.selected span { color: #000 !important; }

        .conflict-msg { 
            color: var(--danger); font-size: 11px; text-align: center; 
            margin-bottom: 10px; font-weight: bold; display: none; 
            background: rgba(251, 113, 133, 0.12); padding: 8px; border-radius: 8px;
        }
        .odds-change {
            margin-top: 7px;
            padding: 6px 8px;
            border-radius: 8px;
            background: rgba(56,189,248,0.12);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
        }

        /* Mobile optimization for event page */
        @media (max-width: 760px) {
            .event-main-info {
                padding: 24px 16px;
                margin-bottom: 20px;
                border-radius: 16px;
            }

            .teams-display {
                gap: 16px;
                margin: 16px 0;
            }

            .team-logo {
                width: 60px;
                height: 60px;
            }

            .event-teams-large {
                font-size: 22px;
                letter-spacing: -0.5px;
            }

            .outcomes-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
            }

            .odd-item {
                padding: 12px;
                border-radius: 10px;
                font-size: 13px;
            }

            .market-name {
                font-size: 12px;
                margin-bottom: 10px;
            }

            .market-tabs {
                gap: 8px;
                margin-bottom: 18px;
            }

            .market-tab {
                padding: 9px 14px;
                font-size: 12px;
            }

            .market-section {
                margin-bottom: 20px;
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .event-main-info {
                padding: 18px 12px;
                margin-bottom: 16px;
                border-radius: 14px;
            }

            .teams-display {
                gap: 12px;
                margin: 14px 0;
            }

            .team-logo {
                width: 50px;
                height: 50px;
            }

            .vs-divider {
                font-size: 18px;
            }

            .event-teams-large {
                font-size: 18px;
            }

            .outcomes-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 8px;
            }

            .odd-item {
                padding: 10px 8px;
                border-radius: 10px;
                font-size: 12px;
                min-height: 48px;
                touch-action: manipulation;
            }

            .odds-change {
                margin-top: 5px;
                padding: 5px 6px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer">Vis<span>BET</span></div>
        <div style="display:flex; gap:12px; align-items:center;">
            <div id="auth-zone" class="user-info"></div>
        </div>
    </header>

    <div class="main-layout" style="display: flex; gap: 25px; padding: 20px; max-width: 1400px; margin: 0 auto;">
        
        <aside class="sidebar" style="flex: 0.8;">
            <button class="glass" onclick="location.href='index.html'" style="width: 100%; padding: 12px; color: #fff; border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);">
                ← К линии
            </button>
        </aside>

        <section class="content-area" style="flex: 3;">
            <div id="event-details-container">
                <div class="event-main-info skeleton" style="height: 250px;"></div>
                <div class="skeleton" style="height: 30px; width: 200px; margin-bottom: 20px;"></div>
                <div class="outcomes-grid">
                    <div class="skeleton" style="height: 60px;"></div>
                    <div class="skeleton" style="height: 60px;"></div>
                    <div class="skeleton" style="height: 60px;"></div>
                </div>
            </div>
        </section>

        <aside id="rightCoupon" class="coupon-area" style="flex: 1.2;">
            <div class="coupon-card glass" style="position: sticky; top: 20px;">
                <div class="coupon-header">
                    <span class="bet-type-badge" id="bet-type">Ординар</span>
                    <span style="font-size: 14px; font-weight: 700;">КУПОН</span>
                </div>
                <div id="slip-items"></div>
                <div id="slip-footer" style="display: none; margin-top: 20px;">
                    <div id="conflict-warning" class="conflict-msg">Несколько исходов одного рынка нельзя ставить вместе</div>
                    <div class="coupon-summary">
                        <input type="number" id="stakeAmount" placeholder="Сумма (₽)" oninput="updateWin()" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px; opacity: 0.7;">
                            <span>Общий Кф:</span><span id="summary-odd" style="color: var(--turquoise); font-weight: 800;">1.00</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 18px;">
                            <span>К выплате:</span><span id="winAmount" style="color: var(--success); font-weight: 900;">0 ₽</span>
                        </div>
                    </div>
                    <button class="btn-submit-bet" id="btn-place-bet" onclick="placeOrder()" style="width: 100%; margin-top: 15px; padding: 15px; border-radius: 12px; border: none; background: var(--turquoise); color: #000; font-weight: bold; cursor: pointer;">Сделать ставку</button>
                    <button onclick="clearSlip()" style="background:none; border:none; color:var(--danger); width:100%; margin-top:10px; cursor:pointer; font-size:11px; opacity: 0.5;">Очистить купон</button>
                </div>
            </div>
        </aside>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKXVkuU3L_bxNIdXyDmUMcZHlpS7IF_Fw",
            authDomain: "visbet-b4fa1.firebaseapp.com",
            projectId: "visbet-b4fa1",
            storageBucket: "visbet-b4fa1.firebasestorage.app",
            messagingSenderId: "551263525115",
            appId: "1:551263525115:web:05265f14a1f1e77d48f85e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.fb = { doc, getDoc, setDoc, updateDoc, onSnapshot, runTransaction };
    </script>

    <script>
        let currentEvent = null;
        let currentUser = null;
        let selectedMarketName = null;
        let isPlacingBet = false;

        const getSlip = () => JSON.parse(localStorage.getItem('visbet_slip') || '[]');
        const saveSlip = (data) => { 
            localStorage.setItem('visbet_slip', JSON.stringify(data)); 
            renderSlip();
            renderEventDetails(); // Перерисовываем, чтобы подсветить выбранные кнопки
        };

        function hasSlipConflict(slip) {
            const seenMatches = {};
            return slip.some(item => {
                const key = `${item.id}::${item.market || 'market'}`;
                const duplicate = Boolean(seenMatches[key]);
                seenMatches[key] = true;
                return duplicate;
            });
        }

        function findFreshOddForSlipItem(item) {
            if (!currentEvent || item.id !== currentEvent.id || !Array.isArray(currentEvent.markets)) return null;
            const market = currentEvent.markets.find(m => m.name === item.market);
            if (!market || !Array.isArray(market.outcomes)) return null;
            const outcome = market.outcomes.find(out => (out.name || out.label) === item.pick);
            return outcome ? Number(outcome.odd) : null;
        }

        function syncSlipOddsForCurrentEvent() {
            let slip = getSlip();
            let changed = false;

            slip = slip.map(item => {
                const freshOdd = findFreshOddForSlipItem(item);
                if (freshOdd && freshOdd !== item.odd) {
                    item.previousOdd = item.odd;
                    item.odd = freshOdd;
                    item.oddChangedAt = Date.now();
                    changed = true;
                }
                return item;
            });

            if (changed) {
                localStorage.setItem('visbet_slip', JSON.stringify(slip));
                renderSlip();
            }
        }

        function getPendingBet(fingerprint) {
            const raw = localStorage.getItem('visbet_pending_bet');
            let pending = null;
            try { pending = raw ? JSON.parse(raw) : null; } catch (e) { pending = null; }
            if (!pending || pending.fingerprint !== fingerprint) {
                pending = {
                    fingerprint,
                    id: String(Date.now()) + String(Math.floor(Math.random() * 900000 + 100000))
                };
                localStorage.setItem('visbet_pending_bet', JSON.stringify(pending));
            }
            return pending;
        }

        function setPlaceOrderBusy(isBusy) {
            const btn = document.getElementById('btn-place-bet');
            if (!btn) return;
            btn.disabled = isBusy;
            btn.style.opacity = isBusy ? '0.45' : '1';
            btn.style.cursor = isBusy ? 'wait' : 'pointer';
            btn.innerText = isBusy ? 'Отправляем...' : 'Сделать ставку';
        }

        async function startPage() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return location.href = 'index.html';

            initUser();
            renderSlip();

            // Загрузка матча
            const docRef = window.fb.doc(window.db, "events", id);
            window.fb.onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    currentEvent = { id: snap.id, ...snap.data() };
                    syncSlipOddsForCurrentEvent();
                    renderEventDetails();
                } else {
                    document.getElementById('event-details-container').innerHTML = "Событие не найдено.";
                }
            });
        }

        function initUser() {
            const uid = localStorage.getItem('visbet_user');
            if(!uid) return;
            
            window.fb.onSnapshot(window.fb.doc(window.db, "users", uid.trim()), (doc) => {
                if(doc.exists()) {
                    currentUser = doc.data();
                    document.getElementById('auth-zone').innerHTML = `
                        <div class="balance">${Math.round(currentUser.balance).toLocaleString()} ₽</div>
                        <div class="username" style="margin-left:10px; opacity:0.5;">${currentUser.username}</div>
                    `;
                }
            });
        }

        function renderEventDetails() {
            if(!currentEvent) return;
            const slip = getSlip();
            const container = document.getElementById('event-details-container');
            const isClosed = currentEvent.status === 'Закрыт';
            
            // Генерация ссылок на логотипы (используем инициалы команд)
            const getLogo = (name) => `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(name)}&backgroundColor=0b4d6b,0c7f95,05f3ff&fontSize=48`;

            container.innerHTML = `
                <div class="event-main-info">
                    <div style="opacity: 0.5; font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">
                        ${currentEvent.sport} — ${currentEvent.league}
                    </div>
                    
                    <div class="teams-display">
                        <img src="${getLogo(currentEvent.teams.home)}" class="team-logo">
                        <div class="vs-divider">VS</div>
                        <img src="${getLogo(currentEvent.teams.away)}" class="team-logo">
                    </div>

                    <div class="event-teams-large">${currentEvent.teams.home} — ${currentEvent.teams.away}</div>
                    <div style="opacity: 0.6; margin-top: 10px;">${currentEvent.date} в ${currentEvent.time}</div>
                    ${isClosed ? '<div class="vb-badge danger" style="margin-top:14px;">Ставки закрыты</div>' : ''}
                </div>
                
                ${(() => {
                    const marketNames = currentEvent.markets.map(m => m.name);
                    const activeMarket = selectedMarketName || marketNames[0] || 'Все рынки';
                    const tabs = ['Все рынки', ...marketNames];
                    const selectedMarket = currentEvent.markets.find(m => m.name === activeMarket) || currentEvent.markets[0] || {name:'Основной рынок', outcomes:[]};
                    const marketsToRender = activeMarket === 'Все рынки' ? currentEvent.markets : [selectedMarket];
                    return `
                        <div class="market-tabs">
                            ${tabs.map(name => `
                                <button class="market-tab ${name === activeMarket ? 'active' : ''}" onclick="selectMarket('${name.replace(/'/g, "\\'")}')">${name}</button>
                            `).join('')}
                        </div>
                        ${marketsToRender.map(market => `
                            <div class="market-section">
                                <span class="market-name">${market.name}</span>
                                <div class="outcomes-grid">
                                    ${market.outcomes.map(out => {
                                        const isSelected = slip.some(s => s.id === currentEvent.id && s.pick === out.name && s.market === market.name);
                                        return `
                                            <div class="odd-item ${isSelected ? 'selected' : ''}" 
                                                 ${isClosed ? 'style="opacity:0.35; pointer-events:none;"' : `onclick="addToSlip('${currentEvent.id}', '${currentEvent.teams.home} — ${currentEvent.teams.away}', '${out.name}', ${out.odd}, '${market.name}')"`}>
                                                <span class="odd-label" style="font-weight: 600; font-size: 14px;">${out.name}</span>
                                                <span class="odd-val">${out.odd}</span>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        `).join('')}
                    `;
                })()}
            `;
        }

        window.selectMarket = (marketName) => {
            selectedMarketName = marketName;
            renderEventDetails();
        };

        window.addToSlip = (id, team, pick, odd, market) => {
            let slip = getSlip();
            const idx = slip.findIndex(i => i.id === id && i.pick === pick && i.market === market);
            
            if(idx > -1) {
                slip.splice(idx, 1); // Если уже есть - убираем (toggle)
            } else {
                slip = slip.filter(i => !(i.id === id && i.market === market));
                slip.push({id, team, pick, odd, market, addedAt: Date.now()});
            }
            saveSlip(slip);
        };

        function renderSlip() {
            const slip = getSlip();
            const container = document.getElementById('slip-items');
            const footer = document.getElementById('slip-footer');
            const warn = document.getElementById('conflict-warning');
            const btn = document.getElementById('btn-place-bet');

            if (slip.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding:30px; opacity:0.3; font-size:12px;">Выберите исход для пари</p>`;
                footer.style.display = 'none';
                return;
            }

            // Конфликт: нельзя брать несколько исходов одного рынка в экспресс
            const hasConflict = hasSlipConflict(slip);

            container.innerHTML = slip.map((item, idx) => `
                <div class="glass" style="padding:12px; border-radius:10px; margin-bottom:8px; border-left: 4px solid var(--turquoise);">
                    <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; margin-bottom:5px;">
                        <span>${item.team}</span>
                        <span onclick="removeFromSlip(${idx})" style="color:var(--danger); cursor:pointer; font-size:18px;">&times;</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:11px;">
                        <span style="opacity:0.6;">${item.market}: <b>${item.pick}</b></span>
                        <span style="color:var(--turquoise); font-weight:bold;">${item.odd}</span>
                    </div>
                    ${item.previousOdd && item.previousOdd !== item.odd ? `<div class="odds-change">было ${item.previousOdd}, стало ${item.odd}</div>` : ''}
                </div>
            `).join('');

            footer.style.display = 'block';
            warn.style.display = (slip.length > 1 && hasConflict) ? 'block' : 'none';
            btn.disabled = (slip.length > 1 && hasConflict);
            btn.style.opacity = btn.disabled ? '0.3' : '1';

            const totalOdd = slip.reduce((acc, i) => acc * i.odd, 1).toFixed(2);
            document.getElementById('summary-odd').innerText = totalOdd;
            document.getElementById('bet-type').innerText = slip.length > 1 ? "Экспресс" : "Ординар";
            updateWin();
        }

        window.removeFromSlip = (idx) => { let s = getSlip(); s.splice(idx, 1); saveSlip(s); };
        window.clearSlip = () => saveSlip([]);
        
        window.updateWin = () => {
            const amt = document.getElementById('stakeAmount').value || 0;
            const odd = parseFloat(document.getElementById('summary-odd').innerText);
            document.getElementById('winAmount').innerText = Math.floor(amt * odd).toLocaleString() + " ₽";
        };

        window.placeOrder = async () => {
            if (isPlacingBet) return alert("Ставка уже отправляется");
            if(!currentUser) return alert("Пожалуйста, войдите в аккаунт");
            const slip = getSlip();
            const amount = Math.floor(document.getElementById('stakeAmount').value);
            
            if(!amount || amount < 10) return alert("Минимальная ставка 10 ₽");
            if(amount > currentUser.balance) return alert("Недостаточно средств");
            if(slip.length === 0) return alert("Купон пуст");
            if(hasSlipConflict(slip)) return alert("Нельзя выбрать несколько исходов одного рынка");

            const bet = {
                userId: currentUser.username,
                amount: amount,
                totalOdd: parseFloat(document.getElementById('summary-odd').innerText),
                items: slip,
                status: "В игре",
                date: new Date().toLocaleString(),
                timestamp: Date.now()
            };
            const fingerprint = JSON.stringify({
                userId: currentUser.username,
                amount,
                totalOdd: bet.totalOdd,
                items: slip.map(item => ({
                    id: item.id,
                    market: item.market,
                    pick: item.pick,
                    odd: item.odd
                }))
            });
            const pendingBet = getPendingBet(fingerprint);
            let createdNewBet = false;

            try {
                isPlacingBet = true;
                setPlaceOrderBusy(true);

                await window.fb.runTransaction(window.db, async (transaction) => {
                    const betRef = window.fb.doc(window.db, "bets", pendingBet.id);
                    const userRef = window.fb.doc(window.db, "users", currentUser.username);
                    const existingBet = await transaction.get(betRef);
                    if (existingBet.exists()) return;
                    createdNewBet = true;

                    const userSnap = await transaction.get(userRef);
                    if (!userSnap.exists()) throw new Error("Пользователь не найден");
                    const freshUser = userSnap.data();
                    if ((freshUser.balance || 0) < amount) throw new Error("Недостаточно средств");

                    transaction.set(betRef, {
                        ...bet,
                        requestKey: fingerprint,
                        idempotencyKey: pendingBet.id
                    });
                    transaction.update(userRef, {
                        balance: (freshUser.balance || 0) - amount
                    });
                });

                if (createdNewBet) {
                    await window.fb.setDoc(window.fb.doc(window.db, "balance_history", `bh_${pendingBet.id}`), {
                        userId: currentUser.username,
                        type: "Ставка",
                        label: `Списано за пари ${pendingBet.id.slice(-6)}`,
                        amount: -amount,
                        betId: pendingBet.id,
                        createdAt: new Date().toLocaleString(),
                        timestamp: Date.now()
                    });
                }

                saveSlip([]);
                localStorage.removeItem('visbet_pending_bet');
                alert("Пари успешно принято!");
                location.href = 'index.html';
            } catch(e) {
                alert(e.message || "Ошибка соединения с сервером");
            } finally {
                isPlacingBet = false;
                setPlaceOrderBusy(false);
            }
        };

        window.addEventListener('storage', () => { renderSlip(); renderEventDetails(); });
        document.addEventListener('DOMContentLoaded', startPage);
    </script>
</body>
</html>
